<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Multi-Device Puzzle</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  body {
    margin: 0;
    font-family: "Oswald", sans-serif;
    background: #111;
    color: white;
    overflow: hidden;
    user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }

  #infoWrap { text-align: center; margin-top: 18px; }
  #status { font-size: 28px; }
  #sub { font-size: 16px; opacity: 0.7; margin-top: -4px; }

  /* MAIN BUTTON */
  #mainBtn {
    --offset: 14px;
    width: 220px;
    height: 220px;
    position: absolute;
    /* Center the block including the shadow offset */
    left: 50%;
    top: 45%;
    transform: translate(calc(-50% - var(--offset)/2), calc(-50% - var(--offset)/2));
    
    border: none;
    display: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: var(--offset) var(--offset) 0 rgba(255,255,255,0.08);
  }

  #mainBtn.pressed {
    /* Move back to true center when shadow is gone */
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 rgba(255,255,255,0.08);
  }

  /* BOTTOM SELECTORS */
  #bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .colorBtn {
    height: 90px;
    border: none;
    margin: 0;
    transition: transform 0.12s ease;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .colorBtn svg {
    display: none;
    width: 26px;
    height: 26px;
    color: white;
  }

  .colorBtn.active { transform: translateY(-10px); }
  .colorBtn.active svg { display: block; }
  .colorBtn.active::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 2px solid white;
    pointer-events: none;
  }

  /* BACKGROUND LINES */
  .line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.08);
    animation: grow 1s ease-out forwards;
    pointer-events: none;
  }

  @keyframes grow {
    0% { transform: scaleY(0.2); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: scaleY(6); opacity: 0; }
  }
</style>
</head>

<body>

<div id="infoWrap">
  <div id="status">0 / 7</div>
  <div id="sub">buttons pressed</div>
</div>

<button id="mainBtn"></button>

<div id="bottom"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

const firebaseConfig = {
  apiKey: "AIzaSyBadLM5gvODvZnVSoMm-GPE_sBXB8nvLyQ",
  authDomain: "kercher-animal-puzzle.firebaseapp.com",
  databaseURL: "https://kercher-animal-puzzle-default-rtdb.firebaseio.com",
  projectId: "kercher-animal-puzzle",
  storageBucket: "kercher-animal-puzzle.firebasestorage.app",
  messagingSenderId: "1071779664923",
  appId: "1:1071779664923:web:2f180579c9d9ae34f454be"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const room = "default";
const deviceId = Math.random().toString(36).substring(2, 10);
const colors = ["#cd5955","#ce846c","#d3b48d","#96a188","#709ead","#6c839e","#79708d"];

const bottom = document.getElementById("bottom");
const mainBtn = document.getElementById("mainBtn");
const status = document.getElementById("status");

let selectedColor = null;
let isHolding = false;

/* BUILD COLOR BUTTONS */
colors.forEach(c => {
  const b = document.createElement("button");
  b.className = "colorBtn";
  b.style.background = c;
  b.innerHTML = '<i data-lucide="user-round"></i>';

  b.addEventListener("click", () => {
    selectedColor = c;

    mainBtn.style.display = "block";
    mainBtn.style.background = c;

    document.querySelectorAll(".colorBtn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");

    lucide.createIcons();
  });

  bottom.appendChild(b);
});

/* FIREBASE STATE */
function setState(val) {
  if (!selectedColor) return;
  set(ref(db, `rooms/${room}/${deviceId}`), val);
}

let holdTimer = null;
let holding = false;

mainBtn.addEventListener("pointerdown", (e) => {
  if (!selectedColor) return;

  mainBtn.setPointerCapture(e.pointerId);

  holding = false;

  holdTimer = setTimeout(() => {
    holding = true;

    mainBtn.classList.add("pressed");

    setState({
      color: selectedColor,
      holding: true
    });
  }, 120); // small delay prevents tap flicker
});

function release(e) {
  clearTimeout(holdTimer);

  mainBtn.classList.remove("pressed");

  if (holding) {
    setState({
      color: selectedColor,
      holding: false
    });
  }

  holding = false;
}

mainBtn.addEventListener("pointerup", release);
mainBtn.addEventListener("pointercancel", release);
mainBtn.addEventListener("pointerleave", release);

/* GLOBAL COUNT UPDATER */
onValue(ref(db, `rooms/${room}`), snap => {
  const data = snap.val() || {};

  const activeColors = new Set();

  Object.values(data).forEach(device => {
    if (device?.holding && device?.color) {
      activeColors.add(device.color);
    }
  });

  const count = activeColors.size;

  status.textContent = `${count} / 7`;

  if (count > 0) spawnLines(count);

  if (count >= 7) {
    document.body.innerHTML =
      "<h1 style='text-align:center; margin-top:40vh'>SUCCESS</h1>";
  }
});

/* BACKGROUND EFFECT */
function spawnLines(intensity) {
  const n = Math.max(1, intensity);
  for (let i = 0; i < n; i++) {
    const d = document.createElement("div");
    d.className = "line";
    d.style.top = Math.random() * 100 + "%";
    d.style.animationDuration = (1 - intensity * 0.05) + "s";
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 1000);
  }
}

window.addEventListener("beforeunload", () => {
  remove(ref(db, `rooms/${room}/${deviceId}`));
});

lucide.createIcons();
</script>

</body>
</html>

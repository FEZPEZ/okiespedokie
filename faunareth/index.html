<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Multi-Device Puzzle</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #mainBtn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin: 80px auto;
      display: none;
      font-size: 20px;
      border: none;
      color: white;
    }

    .colorBtn {
      width: 60px;
      height: 60px;
      margin: 10px;
      border: none;
      border-radius: 10px;
    }

    #bottom {
      position: fixed;
      bottom: 10px;
      width: 100%;
    }

    #status {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>Select a color</h2>

<div id="mainBtn">HOLD</div>

<div id="status">0 / 7 buttons pressed</div>

<div id="bottom">
  <button class="colorBtn" id="redBtn" style="background:red"></button>
  <button class="colorBtn" id="blueBtn" style="background:blue"></button>
  <button class="colorBtn" id="greenBtn" style="background:green"></button>
  <button class="colorBtn" id="purpleBtn" style="background:purple"></button>
  <button class="colorBtn" id="orangeBtn" style="background:orange"></button>
  <button class="colorBtn" id="yellowBtn" style="background:yellow"></button>
  <button class="colorBtn" id="pinkBtn" style="background:pink"></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBadLM5gvODvZnVSoMm-GPE_sBXB8nvLyQ",
  authDomain: "kercher-animal-puzzle.firebaseapp.com",
  databaseURL: "https://kercher-animal-puzzle-default-rtdb.firebaseio.com",
  projectId: "kercher-animal-puzzle",
  storageBucket: "kercher-animal-puzzle.firebasestorage.app",
  messagingSenderId: "1071779664923",
  appId: "1:1071779664923:web:2f180579c9d9ae34f454be"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const room = "default";
const deviceId = Math.random().toString(36).substring(2, 10);

const mainBtn = document.getElementById("mainBtn");
const status = document.getElementById("status");

let isHolding = false;

// -------------------------
// COLOR SELECTION (FIXED)
// -------------------------

function selectColor(color) {
  mainBtn.style.display = "block";
  mainBtn.style.background = color;
  document.querySelector("h2").style.display = "none";
}

// attach listeners instead of inline onclick
const colorMap = {
  redBtn: "red",
  blueBtn: "blue",
  greenBtn: "green",
  purpleBtn: "purple",
  orangeBtn: "orange",
  yellowBtn: "yellow",
  pinkBtn: "pink"
};

Object.entries(colorMap).forEach(([id, color]) => {
  document.getElementById(id).addEventListener("click", () => {
    selectColor(color);
  });
});

// -------------------------
// HOLD LOGIC
// -------------------------

function updateState(val) {
  set(ref(db, `rooms/${room}/${deviceId}`), val);
}

// Pointer events = more reliable than mouse/touch split
mainBtn.addEventListener("pointerdown", () => {
  isHolding = true;
  updateState(true);
});

function release() {
  if (!isHolding) return;
  isHolding = false;
  updateState(false);
}

mainBtn.addEventListener("pointerup", release);
mainBtn.addEventListener("pointercancel", release);
mainBtn.addEventListener("pointerleave", release);

// -------------------------
// GLOBAL STATE LISTENER
// -------------------------

onValue(ref(db, `rooms/${room}`), (snapshot) => {
  const data = snapshot.val() || {};
  const values = Object.values(data);

  const count = values.filter(v => v === true).length;
  status.innerText = `${count} / 7 buttons pressed`;

  if (count >= 7) {
    document.body.innerHTML = "<h1 style='margin-top:40vh'>SUCCESS</h1>";
  }
});

// -------------------------
// CLEANUP
// -------------------------

window.addEventListener("beforeunload", () => {
  remove(ref(db, `rooms/${room}/${deviceId}`));
});

</script>

</body>
</html>

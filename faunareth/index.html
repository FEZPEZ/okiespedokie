<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Multi-Device Puzzle</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  body {
    margin: 0;
    font-family: "Oswald", sans-serif;
    background: #111;
    color: white;
    overflow: hidden;
    user-select: none; /* Prevents text selection */
    touch-action: none;
    overscroll-behavior: none;
  }

  /* Layering: Everything is above the bgLayer */
  #bgLayer {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
  }

  #infoWrap { text-align: center; margin-top: 18px; position: relative; z-index: 1; }
  #status { font-size: 28px; }
  #sub { font-size: 16px; opacity: 0.7; margin-top: -4px; }

  /* MAIN BUTTON */
  #mainBtn {
    --offset: 14px;
    width: 220px;
    height: 220px;
    position: absolute;
    left: 50%;
    top: 45%;
    transform: translate(calc(-50% - var(--offset)/2), calc(-50% - var(--offset)/2));
    
    border: none;
    display: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    /* Increased opacity for white shadow visibility */
    box-shadow: var(--offset) var(--offset) 0 rgba(255,255,255,0.21);
    
    /* Remove tap highlight and focus outlines */
    outline: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  #mainBtn.pressed {
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 rgba(255,255,255,0.2);
  }

  /* BOTTOM SELECTORS */
  #bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    z-index: 1;
  }

  .colorBtn {
    height: 90px;
    border: none;
    margin: 0;
    transition: transform 0.12s ease;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .colorBtn svg {
    display: none;
    width: 26px;
    height: 26px;
    color: white;
  }

  .colorBtn.active { transform: translateY(-10px); }
  .colorBtn.active svg { display: block; }
  .colorBtn.active::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 2px solid white;
    pointer-events: none;
  }

  /* BACKGROUND LINES */
  .line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.08);
    animation: grow 1s ease-out forwards;
  }

  @keyframes grow {
    0% { transform: scaleY(0.2); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: scaleY(6); opacity: 0; }
  }
</style>
</head>

<body>

<div id="bgLayer"></div>

<div id="infoWrap">
  <div id="status">0 / 7</div>
  <div id="sub">buttons pressed</div>
</div>

<button id="mainBtn"></button>

<div id="bottom"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

const firebaseConfig = {
  apiKey: "AIzaSyBadLM5gvODvZnVSoMm-GPE_sBXB8nvLyQ",
  authDomain: "kercher-animal-puzzle.firebaseapp.com",
  databaseURL: "https://kercher-animal-puzzle-default-rtdb.firebaseio.com",
  projectId: "kercher-animal-puzzle",
  storageBucket: "kercher-animal-puzzle.firebasestorage.app",
  messagingSenderId: "1071779664923",
  appId: "1:1071779664923:web:2f180579c9d9ae34f454be"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const room = "default";
const deviceId = Math.random().toString(36).substring(2, 10);
const colors = ["#cd5955","#ce846c","#d3b48d","#96a188","#709ead","#6c839e","#79708d"];

const bgLayer = document.getElementById("bgLayer");
const bottom = document.getElementById("bottom");
const mainBtn = document.getElementById("mainBtn");
const status = document.getElementById("status");

// Define spawn rates in ms (Index 0 is unused, 1-7 mapped)
const SPAWN_RATES = {
  1: 800,
  2: 600,
  3: 450,
  4: 350,
  5: 250,
  6: 150,
  7: 80
};

let selectedColor = null;
let isHolding = false;
let lineInterval = null; // Store interval ID

/* BUILD COLOR BUTTONS */
colors.forEach(c => {
  const b = document.createElement("button");
  b.className = "colorBtn";
  b.style.background = c;
  b.innerHTML = '<i data-lucide="user-round"></i>';

  b.addEventListener("click", () => {
    selectedColor = c;
    mainBtn.style.display = "block";
    mainBtn.style.background = c;
    document.querySelectorAll(".colorBtn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    lucide.createIcons();
  });

  bottom.appendChild(b);
});

/* FIREBASE STATE */
function setState(val) {
  if (!selectedColor) return;
  set(ref(db, `rooms/${room}/${deviceId}`), val);
}

/* MAIN BUTTON INTERACTION */
mainBtn.addEventListener("pointerdown", () => {
  if (!selectedColor) return;
  isHolding = true;
  mainBtn.classList.add("pressed");
  setState({ color: selectedColor, holding: true });
});

function release() {
  if (!isHolding) return;
  isHolding = false;
  mainBtn.classList.remove("pressed");
  setState({ color: selectedColor, holding: false });
}

mainBtn.addEventListener("pointerup", release);
mainBtn.addEventListener("pointercancel", release);
mainBtn.addEventListener("pointerleave", release);

/* GLOBAL COUNT UPDATER */
onValue(ref(db, `rooms/${room}`), snap => {
  const data = snap.val() || {};
  const activeColors = new Set();
  Object.values(data).forEach(device => {
    if (device?.holding && device?.color) activeColors.add(device.color);
  });

  const count = activeColors.size;
  status.textContent = `${count} / 7`;

  // Manage Spawning Interval
  clearInterval(lineInterval);
  if (count > 1) {
    const rate = SPAWN_RATES[count] || 500;
    lineInterval = setInterval(() => spawnLine(), rate);
  }

  if (count >= 7) {
    document.body.innerHTML = "<h1 style='text-align:center; margin-top:40vh'>SUCCESS</h1>";
  }
});

/* BACKGROUND EFFECT */
function spawnLine() {
  const d = document.createElement("div");
  d.className = "line";
  d.style.top = Math.random() * 100 + "%";
  bgLayer.appendChild(d);
  setTimeout(() => d.remove(), 1000);
}

window.addEventListener("beforeunload", () => {
  remove(ref(db, `rooms/${room}/${deviceId}`));
});

lucide.createIcons();
</script>

</body>
</html>

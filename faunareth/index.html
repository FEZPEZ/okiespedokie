<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Multi-Device Puzzle</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  body {
    margin: 0;
    font-family: "Oswald", sans-serif;
    background: #111;
    color: white;
    text-align: center;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  h2 {
    margin-top: 20px;
  }

  /* MAIN BUTTON */
  #mainBtn {
    width: 220px;
    height: 220px;
    margin: 60px auto;
    display: none;
    position: relative;

    border-radius: 0;
    border: none;

    font-size: 22px;
    color: white;

    box-shadow: 10px 10px 0 rgba(0,0,0,0.6);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  #mainBtn.pressed {
    transform: translate(8px, 8px);
    box-shadow: 0px 0px 0 rgba(0,0,0,0.6);
  }

  #holdIcon {
    position: absolute;
    top: -35px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
  }

  #mainBtn.pressed #holdIcon {
    display: block;
  }

  /* BOTTOM BUTTONS */
  #bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .colorBtn {
    height: 90px;
    border: none;
    border-radius: 0;
    transition: transform 0.12s ease, outline 0.12s ease;
    position: relative;
  }

  .colorBtn.active {
    transform: translateY(-10px);
    outline: 2px solid white;
    outline-offset: -4px;
  }

  /* BACKGROUND LINES */
  .line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.08);
    animation: grow 1.2s ease-out forwards;
    pointer-events: none;
  }

  @keyframes grow {
    0% { transform: scaleY(0.2); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: scaleY(6); opacity: 0; }
  }

  #status {
    font-size: 22px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h2>Select a color</h2>

<div id="mainBtn">
  <div id="holdIcon" data-lucide="user-round"></div>
  HOLD
</div>

<div id="status">0 / 7</div>

<div id="bottom"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBadLM5gvODvZnVSoMm-GPE_sBXB8nvLyQ",
  authDomain: "kercher-animal-puzzle.firebaseapp.com",
  databaseURL: "https://kercher-animal-puzzle-default-rtdb.firebaseio.com",
  projectId: "kercher-animal-puzzle",
  storageBucket: "kercher-animal-puzzle.firebasestorage.app",
  messagingSenderId: "1071779664923",
  appId: "1:1071779664923:web:2f180579c9d9ae34f454be"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const room = "default";
const deviceId = Math.random().toString(36).substring(2, 10);

/* PALETTE */
const colors = [
  "#cd5955",
  "#ce846c",
  "#d3b48d",
  "#96a188",
  "#709ead",
  "#6c839e",
  "#79708d"
];

const bottom = document.getElementById("bottom");
const mainBtn = document.getElementById("mainBtn");
const status = document.getElementById("status");
const h2 = document.querySelector("h2");

let selectedColor = null;
let isHolding = false;

/* BUILD BUTTONS */
colors.forEach((c, i) => {
  const b = document.createElement("button");
  b.className = "colorBtn";
  b.style.background = c;

  b.addEventListener("click", () => {
    selectedColor = c;
    mainBtn.style.display = "block";
    mainBtn.style.background = c;
    h2.style.display = "none";

    document.querySelectorAll(".colorBtn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  });

  bottom.appendChild(b);
});

/* STATE HELPERS */
function setColorState(color, state) {
  set(ref(db, `rooms/${room}/${deviceId}/${color}`), state);
}

mainBtn.addEventListener("pointerdown", () => {
  if (!selectedColor) return;
  isHolding = true;
  mainBtn.classList.add("pressed");
  setColorState(selectedColor, true);
});

function release() {
  if (!isHolding) return;
  isHolding = false;
  mainBtn.classList.remove("pressed");
  setColorState(selectedColor, false);
}

mainBtn.addEventListener("pointerup", release);
mainBtn.addEventListener("pointercancel", release);
mainBtn.addEventListener("pointerleave", release);

/* GLOBAL STATE */
onValue(ref(db, `rooms/${room}`), (snap) => {
  const data = snap.val() || {};

  const allColors = new Set();

  for (const dev of Object.values(data)) {
    for (const [color, val] of Object.entries(dev || {})) {
      if (val) allColors.add(color);
    }
  }

  const count = allColors.size;
  status.textContent = `${count} / 7`;

  spawnLines(count);

  if (count >= 7) {
    document.body.innerHTML = "<h1 style='margin-top:40vh'>SUCCESS</h1>";
  }
});

/* BACKGROUND EFFECT */
function spawnLines(intensity) {
  const lines = Math.max(1, intensity);

  for (let i = 0; i < lines; i++) {
    const d = document.createElement("div");
    d.className = "line";
    d.style.top = Math.random() * 100 + "%";
    d.style.animationDuration = (1.2 - intensity * 0.1) + "s";

    document.body.appendChild(d);

    setTimeout(() => d.remove(), 1200);
  }
}

/* CLEANUP */
window.addEventListener("beforeunload", () => {
  remove(ref(db, `rooms/${room}/${deviceId}`));
});

lucide.createIcons();
</script>

</body>
</html>

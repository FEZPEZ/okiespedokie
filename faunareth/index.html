<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Multi-Device Puzzle</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root { --glow-radius: 25px; }

/* Hide both by default to prevent FOUC */
#gameContainer, #desktopFallback { display: none; }

* { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
body, button { -webkit-user-select: none; user-select: none; touch-action: none; }
html, body { margin: 0; padding: 0; height: 100%; width: 100%; overscroll-behavior: none; -webkit-text-size-adjust: 100%; background: #111; }
body { font-family: "Oswald", sans-serif; color: white; overflow: hidden; }

/* Desktop Fallback */
#desktopFallback {
    position: fixed; inset: 0; z-index: 9999;
    background: #111;
    justify-content: center; align-items: center;
}
#desktopFallback i { width: 80px; height: 80px; color: white; }

#gameContainer { transition: filter 0.5s ease; height: 100%; width: 100%; }
#gameContainer.invert-mode { filter: grayscale(1) invert(1); }

/* Overlays */
#bgLayer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#pulseOverlay { 
    position: fixed; inset: 0; z-index: 0; pointer-events: none; 
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    opacity: 0;
}
#bgFade { 
    position: fixed; inset: 0; z-index: 100; background: #111; 
    opacity: 0; pointer-events: none; transition: opacity 2s ease;
}

#infoWrap { text-align: center; margin-top: 18px; position: relative; z-index: 1; transition: text-shadow 0.2s ease; }
#infoWrap.glowing { text-shadow: 0 0 var(--glow-radius) #fff; }

#status { font-size: 28px; }
#sub { font-size: 16px; opacity: 0.7; margin-top: -4px; }

/* MAIN BUTTON */
#mainBtn {
  /* Logic: Offset=14px. Unpressed is shifted -7px/-7px. Pressed is centered. */
  --offset: 14px;
  --is-pressed: 0; 
  --shake-x: 0px;
  --shake-y: 0px;
  
  width: 220px;
  height: 220px;
  
  position: absolute;
  left: 50%;
  top: 50%; /* Centered anchor */
  
  /* Translation Logic:
     Base: -50% (Center)
     Adjustment: -(1 - is-pressed) * (offset/2) 
     Result: If unpressed, shifts up/left. If pressed, returns to true center.
  */
  transform: translate(
    calc(-50% - (1 - var(--is-pressed)) * (var(--offset) / 2) + var(--shake-x)),
    calc(-50% - (1 - var(--is-pressed)) * (var(--offset) / 2) + var(--shake-y))
  );

  border: none;
  display: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  backface-visibility: hidden;
  will-change: transform, box-shadow, background-color;

  /* Shadow logic: offset when unpressed, removed when pressed */
  box-shadow: calc(var(--offset) * (1 - var(--is-pressed))) calc(var(--offset) * (1 - var(--is-pressed))) 0 rgba(255,255,255,0.11);
  transition: box-shadow 0.12s linear, transform 0.12s linear;
}

#mainBtn.pressed {
  --is-pressed: 1;
}

#mainBtn.fade-bg {
  transition: box-shadow 0.12s linear, transform 0.12s linear, background-color 4.4s linear;
}

@keyframes pulse {
  0% { opacity: 0; transform: scale(1); }
  50% { opacity: 0.4; }
  100% { opacity: 0; transform: scale(1.5); }
}
#pulseOverlay.active { animation: pulse 1.5s infinite ease-in-out; }

/* BOTTOM SELECTORS */
#bottom { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(7, 1fr); z-index: 1; }
.colorBtn { height: 90px; border: none; margin: 0; transition: transform 0.12s ease; position: relative; display: flex; justify-content: center; align-items: center; outline: none; }
.colorBtn svg { display: none; width: 26px; height: 26px; color: white; }
.colorBtn.active { transform: translateY(-10px); }
.colorBtn.active svg { display: block; }
.colorBtn.active::after { content: ""; position: absolute; inset: 0; border: 2px solid white; pointer-events: none; }

/* Particle Effect */
.particle {
    position: absolute;
    background: white;
    opacity: 0.11;
    pointer-events: none;
    animation: fadeGrow 1s forwards;
}
@keyframes fadeGrow {
    0% { transform: scale(1); opacity: 0.11; }
    100% { transform: scale(2); opacity: 0; }
}
</style>
</head>

<body>

<div id="desktopFallback">
    <i data-lucide="smartphone"></i>
</div>

<div id="gameContainer">
    <div id="bgLayer"></div>
    <div id="pulseOverlay"></div>
    <div id="infoWrap">
      <div id="status">0 / 7</div>
      <div id="sub">buttons pressed</div>
    </div>
    <button id="mainBtn"></button>
    <div id="bottom"></div>
</div>

<div id="bgFade"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const MOBILE_ONLY_MODE = false;
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

if (!MOBILE_ONLY_MODE || isMobile) {
    document.getElementById("gameContainer").style.display = "block";
} else {
    document.getElementById("desktopFallback").style.display = "flex";
}

if (!MOBILE_ONLY_MODE || isMobile) {
    const CONFIG = {
        PARTICLE_MIN_SIZE: 30,
        PARTICLE_MAX_SIZE: 60,
        INITIAL_SPAWN_DELAY: 200,
        MIN_SPAWN_DELAY: 20,
        GLOW_RADIUS: "22px",
        SUCCESS_DURATION: 5000
    };

    const REQUIRED_SUCCESS_COUNT = 2;
    const gameContainer = document.getElementById("gameContainer");

    function initApp() {
        const saved = JSON.parse(localStorage.getItem("gameSuccess"));
        if (saved?.success) {
            document.body.innerHTML = `<h1 style="display:flex; height:100vh; justify-content:center; align-items:center; color:white; font-size: 5rem;">${saved.color}</h1>`;
            return; 
        }
    }
    initApp();

    const firebaseConfig = {
      apiKey: "AIzaSyBadLM5gvODvZnVSoMm-GPE_sBXB8nvLyQ",
      authDomain: "kercher-animal-puzzle.firebaseapp.com",
      databaseURL: "https://kercher-animal-puzzle-default-rtdb.firebaseio.com",
      projectId: "kercher-animal-puzzle",
      storageBucket: "kercher-animal-puzzle.firebasestorage.app",
      messagingSenderId: "1071779664923",
      appId: "1:1071779664923:web:2f180579c9d9ae34f454be"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const room = "default";
    const deviceId = Math.random().toString(36).substring(2, 10);
    const colors = ["#cd5955","#ce846c","#d3b48d","#96a188","#709ead","#6c839e","#79708d"];
    const colorNames = ["Red", "Orange", "Tan", "Green", "Teal", "Blue", "Purple"];

    const bottom = document.getElementById("bottom");
    const mainBtn = document.getElementById("mainBtn");
    const status = document.getElementById("status");
    const infoWrap = document.getElementById("infoWrap");
    const pulseOverlay = document.getElementById("pulseOverlay");
    const bgFade = document.getElementById("bgFade");

    let selectedColor = null;
    let selectedColorName = null;
    let isHolding = false;
    let successTimer = null;
    let shakeRaf = null;
    let mag = 0;
    let magInterval = null;
    let particleTimeout = null;
    let startTime = null;

    /* BUILD UI */
    colors.forEach((c, i) => {
      const b = document.createElement("button");
      b.className = "colorBtn";
      b.style.background = c;
      b.innerHTML = '<i data-lucide="user-round"></i>';
      b.addEventListener("click", () => {
        selectedColor = c;
        selectedColorName = colorNames[i];
        mainBtn.style.display = "block";
        mainBtn.style.backgroundColor = selectedColor;
    
        document.querySelectorAll(".colorBtn").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        lucide.createIcons();
    });
      bottom.appendChild(b);
    });

    function shakeEffect() {
      const x = (Math.random() - 0.5) * mag;
      const y = (Math.random() - 0.5) * mag;
      
      mainBtn.style.setProperty("--shake-x", `${x}px`);
      mainBtn.style.setProperty("--shake-y", `${y}px`);
      shakeRaf = requestAnimationFrame(shakeEffect);
    }

    function spawnParticle() {
        const p = document.createElement("div");
        p.className = "particle";
        const size = Math.random() * (CONFIG.PARTICLE_MAX_SIZE - CONFIG.PARTICLE_MIN_SIZE) + CONFIG.PARTICLE_MIN_SIZE;
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = Math.random() * window.innerWidth + "px";
        p.style.top = Math.random() * window.innerHeight + "px";
        document.getElementById("bgLayer").appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }

    function particleLoop() {
        spawnParticle();
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / CONFIG.SUCCESS_DURATION, 1);
        const delay = Math.max(CONFIG.MIN_SPAWN_DELAY, CONFIG.INITIAL_SPAWN_DELAY - ((CONFIG.INITIAL_SPAWN_DELAY - CONFIG.MIN_SPAWN_DELAY) * progress));
        particleTimeout = setTimeout(particleLoop, delay);
    }

    function startSuccessSequence() {
        pulseOverlay.classList.add("active");
        document.documentElement.style.setProperty('--glow-radius', CONFIG.GLOW_RADIUS);
        infoWrap.classList.add("glowing");
    
        mainBtn.classList.add("fade-bg");
        mainBtn.style.backgroundColor = "white";
    
        startTime = Date.now();
        particleLoop();
        mag = 0;
        shakeEffect();
        magInterval = setInterval(() => { mag = Math.min(mag + 5, 50); }, 20);
    }

    function cancelSuccessSequence() {
      cancelAnimationFrame(shakeRaf);
      clearInterval(magInterval);
      clearTimeout(particleTimeout);
      
      mainBtn.style.setProperty("--shake-x", "0px");
      mainBtn.style.setProperty("--shake-y", "0px");
    
      mainBtn.classList.remove("fade-bg");
      mainBtn.style.backgroundColor = selectedColor;
    
      pulseOverlay.classList.remove("active");
      infoWrap.classList.remove("glowing");
      clearTimeout(successTimer);
      successTimer = null;
    }

    function runFinalTransition() {
        gameContainer.classList.add("invert-mode");
        bgFade.style.opacity = "1";
        localStorage.setItem("gameSuccess", JSON.stringify({ success: true, color: selectedColorName }));
        setTimeout(() => { document.body.innerHTML = `<h1 style="display:flex; height:100vh; justify-content:center; align-items:center; color:white; font-size: 5rem;">${selectedColorName}</h1>`; }, 2000);
    }

    function setState(val) {
      if (!selectedColor) return;
      set(ref(db, `rooms/${room}/${deviceId}`), val);
    }

    mainBtn.addEventListener("pointerdown", () => {
      if (!selectedColor) return;
      isHolding = true;
      mainBtn.classList.add("pressed");
      setState({ color: selectedColor, holding: true });
    });

    function release() {
      if (!isHolding) return;
      isHolding = false;
      mainBtn.classList.remove("pressed");
      cancelSuccessSequence();
      setState({ color: selectedColor, holding: false });
    }

    mainBtn.addEventListener("pointerup", release);
    mainBtn.addEventListener("pointercancel", release);
    mainBtn.addEventListener("pointerleave", release);

    onValue(ref(db, `rooms/${room}`), snap => {
      const data = snap.val() || {};
      const activeColors = new Set();
      Object.values(data).forEach(device => {
        if (device?.holding && device?.color) activeColors.add(device.color);
      });
      const count = activeColors.size;
      status.textContent = `${count} / ${REQUIRED_SUCCESS_COUNT}`;
      if (count >= REQUIRED_SUCCESS_COUNT && isHolding) {
          if (!successTimer) {
              startSuccessSequence();
              successTimer = setTimeout(runFinalTransition, CONFIG.SUCCESS_DURATION);
          }
      } else {
          if (successTimer) { cancelSuccessSequence(); }
      }
    });

    window.addEventListener("beforeunload", () => { remove(ref(db, `rooms/${room}/${deviceId}`)); });
}

lucide.createIcons();
</script>
</body>
</html>
